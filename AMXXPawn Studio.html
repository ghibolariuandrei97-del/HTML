<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMXX Studio Ultra - Elite</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: white; display: flex; flex-direction: column; height: 100vh; }
        #header { height: 50px; background: #252526; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 2px solid #5ea32a; flex-shrink: 0; }
        #main { display: flex; flex-grow: 1; overflow: hidden; }
        #sidebar { width: 180px; background: #252526; border-right: 1px solid #3c3c3c; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        #container { flex-grow: 1; }
        .btn-group { display: flex; gap: 4px; }
        .btn { border: none; padding: 6px 10px; cursor: pointer; border-radius: 3px; font-weight: bold; font-size: 9px; color: white; text-transform: uppercase; transition: 0.1s; }
        .btn:active { transform: translateY(1px); }
        .btn-open { background: #3e3e42; }
        .btn-highlight { background: #d9a300; color: black; }
        .btn-paste-high { background: #4a69bd; }
        .btn-copy-high { background: #8e44ad; }
        .btn-copy { background: #007acc; }
        .btn-save { background: #5ea32a; }
        .btn-clean { background: #d13438; }
        .sidebar-section { border-top: 1px solid #3c3c3c; padding-top: 10px; }
        .sidebar-label { font-size: 10px; color: #5ea32a; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        .color-ref { font-size: 10px; display: flex; flex-direction: column; gap: 3px; background: #1a1a1a; padding: 5px; border-radius: 3px; }
        #lib-list { font-size: 10px; color: #888; overflow-y: auto; flex-grow: 1; max-height: 150px; }
        .lib-item { padding: 3px; border-bottom: 1px solid #333; }
        input[type="file"] { display: none; }
        .highlighted-line { background: rgba(217, 163, 0, 0.25) !important; border-left: 3px solid #d9a300; }
        .quick-input { width: 100%; background: #333; border: 1px solid #555; color: white; padding: 4px; font-size: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="header">
    <div class="logo">AMXX<span style="color:white">STUDIO</span></div>
    <div class="btn-group">
        <button class="btn btn-open" onclick="document.getElementById('file-input').click()">Open</button>
        <button class="btn btn-highlight" onclick="toggleHighlight()">Highlight</button>
        <button class="btn btn-paste-high" onclick="pasteHighlighted()">Paste High</button>
        <button class="btn btn-copy-high" onclick="copyHighlighted()">Copy High</button>
        <button class="btn btn-copy" onclick="copyCode()">Copy All</button>
        <button class="btn btn-save" onclick="saveFile()">Save</button>
        <button class="btn btn-clean" onclick="cleanEditor()">Clean</button>
    </div>
</div>

<input type="file" id="file-input" accept=".sma,.inc" onchange="openSmaFile(this)">

<div id="main">
    <div id="sidebar">
        <div>
            <label class="btn" style="background:#3e3e42; width:100%; display:block; text-align:center; padding:8px 0;" onclick="document.getElementById('inc-upload').click()">+ ADD LIBRARIES</label>
            <input type="file" id="inc-upload" accept=".inc" multiple onchange="loadLibraries(this)">
            <div id="lib-list">No .inc loaded.</div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Chat Colors</div>
            <div class="color-ref">
                <span><b style="color:#ccc">^1</b> Normal (Yellow)</span>
                <span><b style="color:#5ea32a">^4</b> Green</span>
                <span><b style="color:#4a69bd">^3</b> Team Color</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Quick New Array</div>
            <input type="text" id="var-name" class="quick-input" placeholder="Variable Name..." onkeydown="if(event.key==='Enter') quickNew()">
        </div>
    </div>
    <div id="container"></div>
</div>

<div class="status-bar" style="height: 22px; background: #007acc; font-size: 11px; display: flex; align-items: center; padding: 0 10px; justify-content: space-between;">
    <div id="file-name-display">File: New Plugin</div>
    <div>Brace Matching Active | Drag & Drop</div>
</div>

<script>
    let loadedFunctions = [];
    let highlightedLines = new Set();
    let decorations = [];

    const START_TEMPLATE = `#include <amxmodx>\n\npublic plugin_init() \n{\n    register_plugin("My First Plugin", "1.0", "YourName");\n}`;

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});

    require(['vs/editor/editor.main'], function() {
        monaco.languages.register({ id: 'pawn' });
        monaco.languages.setMonarchTokensProvider('pawn', {
            tokenizer: {
                root: [
                    [/\b(public|stock|native|forward|new|static|const|return|if|else|switch|case|default|for|while|do|break|continue|enum|struct)\b/, "keyword"],
                    [/\b(id|charsmax|client_print|register_plugin|register_clcmd|get_user_flags|set_user_health|PLUGIN_HANDLED|PLUGIN_CONTINUE|print_chat|print_center)\b/, "type"],
                    [/^\s*#\w+/, "preprocess"],
                    [/\/\/.*/, "comment"],
                    [/[0-9]+/, "number"],
                    [/"([^"\\]|\\.)*"/, "string"],
                ]
            }
        });

        const savedCode = localStorage.getItem('amxx_ultra_code') || START_TEMPLATE;

        window.editor = monaco.editor.create(document.getElementById('container'), {
            value: savedCode,
            language: 'pawn',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14,
            matchBrackets: "always",
            autoClosingBrackets: 'always'
        });

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
        setInterval(() => { localStorage.setItem('amxx_ultra_code', window.editor.getValue()); }, 3000);
    });

    function quickNew() {
        const name = document.getElementById('var-name').value;
        if (!name) return;
        const snippet = `new ${name}[32];`;
        const selection = window.editor.getSelection();
        const op = { range: selection, text: snippet, forceMoveMarkers: true };
        window.editor.executeEdits("my-source", [op]);
        document.getElementById('var-name').value = "";
    }

    function toggleHighlight() {
        const position = window.editor.getPosition();
        const lineNum = position.lineNumber;
        if (highlightedLines.has(lineNum)) highlightedLines.delete(lineNum);
        else highlightedLines.add(lineNum);
        updateDecorations();
    }

    function updateDecorations() {
        let newDecorations = [];
        highlightedLines.forEach(line => {
            newDecorations.push({
                range: new monaco.Range(line, 1, line, 1),
                options: { isWholeLine: true, className: 'highlighted-line' }
            });
        });
        decorations = window.editor.deltaDecorations(decorations, newDecorations);
    }

    function pasteHighlighted() {
        const model = window.editor.getModel();
        let selectedText = [];
        Array.from(highlightedLines).sort((a,b) => a-b).forEach(line => {
            selectedText.push("Line " + line + ": " + model.getLineContent(line));
        });
        if (selectedText.length > 0) {
            window.editor.setValue("");
            highlightedLines.clear();
            updateDecorations();
            window.editor.setValue(selectedText.join('\n'));
            document.getElementById('file-name-display').innerText = "File: Extracted Snippets";
        }
    }

    function copyHighlighted() {
        const model = window.editor.getModel();
        let selectedText = [];
        Array.from(highlightedLines).sort((a,b) => a-b).forEach(line => {
            selectedText.push("Line " + line + ": " + model.getLineContent(line));
        });
        if (selectedText.length > 0) navigator.clipboard.writeText(selectedText.join('\n'));
    }

    function openSmaFile(input) { handleFile(input.files[0]); }
    function handleFile(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            window.editor.setValue(e.target.result);
            document.getElementById('file-name-display').innerText = "File: " + file.name;
            highlightedLines.clear();
            updateDecorations();
        };
        reader.readAsText(file);
    }

    function loadLibraries(input) {
        const list = document.getElementById('lib-list');
        Array.from(input.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const matches = e.target.result.match(/\b(native|stock|forward)\s+([a-zA-Z0-9_]+)\(/g);
                if (matches) {
                    matches.forEach(m => {
                        const name = m.replace(/(native|stock|forward)\s+/, "").replace("(", "");
                        if (!loadedFunctions.includes(name)) loadedFunctions.push(name);
                    });
                }
                const div = document.createElement('div');
                div.className = 'lib-item';
                div.innerText = "✓ " + file.name;
                list.appendChild(div);
            };
            reader.readAsText(file);
        });
    }

    function copyCode() { navigator.clipboard.writeText(window.editor.getValue()); }
    function saveFile() {
        const blob = new Blob([window.editor.getValue()], { type: "text/plain" });
        const a = document.createElement("a");
        a.download = "plugin.sma"; a.href = window.URL.createObjectURL(blob); a.click();
    }
    
    function cleanEditor() { 
        window.editor.setValue(""); 
        highlightedLines.clear();
        updateDecorations();
        document.getElementById('file-name-display').innerText = "File: New Plugin";
    }
</script>
</body>
</html>
